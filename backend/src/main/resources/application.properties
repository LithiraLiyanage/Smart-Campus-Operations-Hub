spring.application.name=backend

# ── MongoDB Atlas Connection ───────────────────────────────────────────────────
# URI is read by MongoConfig.java — do NOT add spring.data.mongodb.database
# separately as that causes the auto-config to ignore the URI on Spring Boot 4.x
spring.data.mongodb.uri=mongodb+srv://db_user:<dbuser%40123>@cluster0.x2ksxja.mongodb.net/?appName=Cluster0
spring.data.mongodb.database=paf_db

# Exclude the Spring Boot auto-configuration for MongoDB so our explicit
# MongoConfig bean is the single source of truth for the MongoClient.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration

# Keep the server on port 8080
server.port=8080